<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #1B5E3B;
      --green-light: #E8F5EE;
      --blue:        #1565C0;
      --bg:          #F4F6F0;
      --card:        #FFFFFF;
      --text:        #1A1A1A;
      --text-2:      #6B7280;
      --text-3:      #9CA3AF;
      --border:      rgba(0,0,0,0.07);
      --pink:        #D63384;
      --pink-bg:     #FDE8F0;
      --radius:      14px;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-top: env(safe-area-inset-top);
      min-height: 100vh;
    }

    /* ── App Bar ── */
    .app-bar {
      background: var(--green);
      padding: 16px 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .bar-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
    }
    .app-title { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    .count-badge {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.18);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Chips ── */
    .chips-wrap {
      overflow-x: auto; display: flex; gap: 7px;
      padding-bottom: 13px; scrollbar-width: none;
    }
    .chips-wrap::-webkit-scrollbar { display: none; }
    .chip {
      white-space: nowrap; padding: 5px 14px; border-radius: 20px;
      font-size: 13px; font-family: 'Sarabun', sans-serif;
      border: 1.5px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.8); background: transparent; cursor: pointer;
    }
    .chip.active { background: #fff; color: var(--green); border-color: #fff; font-weight: 700; }

    /* ── List ── */
    .list-wrap { padding: 14px 12px 90px; }
    .section-label {
      font-size: 11px; font-weight: 600; color: var(--text-2);
      letter-spacing: 0.5px; text-transform: uppercase;
      padding: 4px 4px 7px; margin-top: 6px;
    }
    .section-label:first-child { margin-top: 0; }

    /* ── Card ── */
    .card {
      background: var(--card); border-radius: var(--radius);
      padding: 13px 14px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
      border: 0.5px solid var(--border);
    }
    .card-left { flex: 1; min-width: 0; padding-right: 10px; }
    .card-name { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-cat  { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
    .cat-dot   { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cat-name  { font-size: 11.5px; color: var(--text-2); }
    .note-pill { display: inline-block; background: var(--pink-bg); color: var(--pink); font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; margin-top: 5px; }
    .card-right { text-align: right; flex-shrink: 0; }
    .price      { font-size: 21px; font-weight: 700; color: var(--green); line-height: 1; }
    .cost-line  { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .margin-line{ font-size: 11.5px; font-weight: 600; color: var(--blue); margin-top: 1px; }
    .btn-edit   { margin-top: 7px; font-size: 12px; padding: 4px 13px; border-radius: 20px; border: 1.5px solid var(--green); color: var(--green); background: transparent; cursor: pointer; font-family: 'Sarabun', sans-serif; font-weight: 500; }
    .btn-edit:active { background: var(--green-light); }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: calc(22px + env(safe-area-inset-bottom)); right: 20px;
      width: 54px; height: 54px; border-radius: 50%; background: var(--green);
      color: #fff; font-size: 28px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(27,94,59,0.45); z-index: 200;
    }
    .fab:active { transform: scale(0.93); }

    /* ── Overlay & Sheet ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; }
    .overlay.show { display: block; }
    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
      border-radius: 22px 22px 0 0;
      padding: 18px 18px calc(22px + env(safe-area-inset-bottom));
      z-index: 400; transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(.32,.72,0,1);
      max-height: 92vh; overflow-y: auto;
    }
    .sheet.show { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: #DDD; border-radius: 2px; margin: 0 auto 16px; }
    .sheet-title  { font-size: 17px; font-weight: 700; margin-bottom: 18px; color: var(--text); }
    .field-label  { font-size: 12.5px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; }
    .opt-tag      { font-size: 11px; color: var(--text-3); font-weight: 400; margin-left: 4px; }
    .field-wrap   { margin-bottom: 14px; }
    .form-input, .form-select {
      width: 100%; padding: 11px 13px; border-radius: 11px;
      border: 1.5px solid #E5E7EB; font-size: 15px;
      font-family: 'Sarabun', sans-serif; color: var(--text);
      background: #fff; outline: none; appearance: none;
    }
    .form-input:focus, .form-select:focus { border-color: var(--green); }
    .row-2 { display: flex; gap: 10px; }
    .row-2 .field-wrap { flex: 1; }
    .cat-row { display: flex; gap: 8px; }
    .cat-row .form-select { flex: 0 0 44%; }
    .cat-row .form-input  { flex: 1; }
    .btn-save {
      width: 100%; padding: 14px; border-radius: 13px; background: var(--green);
      color: #fff; font-size: 16px; font-weight: 700; font-family: 'Sarabun', sans-serif;
      border: none; cursor: pointer; margin-top: 6px;
    }
    .btn-save:disabled { opacity: 0.55; }

    /* ── Loading / Toast ── */
    .loading { text-align: center; padding: 40px 20px; color: var(--text-2); font-size: 15px; }
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #1A1A1A; color: #fff; padding: 10px 20px; border-radius: 22px;
      font-size: 13.5px; font-weight: 500; font-family: 'Sarabun', sans-serif;
      z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .toast.err  { background: #C0392B; }
    .toast.ok   { background: var(--green); }
  </style>
</head>
<body>

  <div class="app-bar">
    <div class="bar-top">
      <div class="app-title">ราคาสินค้า</div>
      <div class="count-badge" id="count-badge">กำลังโหลด...</div>
    </div>
    <div class="chips-wrap" id="chips-wrap">
      <button class="chip active" onclick="setFilter('')" data-type="">ทั้งหมด</button>
    </div>
  </div>

  <div class="list-wrap" id="list-wrap">
    <div class="loading">⏳ กำลังโหลดข้อมูล...</div>
  </div>

  <button class="fab" onclick="openSheet()" aria-label="เพิ่มสินค้า">＋</button>

  <div class="overlay" id="overlay" onclick="closeSheet()"></div>

  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">➕ เพิ่มสินค้าใหม่</div>
    <div class="field-wrap">
      <div class="field-label">ชื่อสินค้า *</div>
      <input type="text" id="n-name" class="form-input" placeholder="เช่น ถุงร้อน 4x6">
    </div>
    <div class="row-2">
      <div class="field-wrap">
        <div class="field-label">ราคาขาย (฿) *</div>
        <input type="number" id="n-price" class="form-input" placeholder="0" inputmode="decimal">
      </div>
      <div class="field-wrap">
        <div class="field-label">ราคาทุน (฿) <span class="opt-tag">ไม่บังคับ</span></div>
        <input type="number" id="n-cost" class="form-input" placeholder="0" inputmode="decimal">
      </div>
    </div>
    <div class="field-wrap">
      <div class="field-label">หมวดหมู่ *</div>
      <div class="cat-row">
        <select id="n-type-sel" class="form-select" onchange="syncType()">
          <option value="">-- เลือก --</option>
        </select>
        <input type="text" id="n-type" class="form-input" placeholder="หรือพิมพ์ใหม่">
      </div>
    </div>
    <button class="btn-save" id="btn-save" onclick="submitAdd()">💾 บันทึก</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwO1wxHYO4DeHZdI9rVK48LsHOjDbAUrHgFW8vVDu9Lq4DpYu19u167H9VmXA-cMt2-/exec';

    let allData    = [];
    let activeType = '';
    const palette  = ['#1B5E3B','#1565C0','#AD1457','#E65100','#6A1B9A','#00695C','#37474F'];
    const colorMap = {};
    let colorIdx   = 0;
    function catColor(t) {
      if (!colorMap[t]) colorMap[t] = palette[colorIdx++ % palette.length];
      return colorMap[t];
    }

    // ── Load data ──
    window.onload = () => {
      fetch(`${SCRIPT_URL}?action=getData`)
        .then(r => r.json())
        .then(data => {
          allData = data;
          buildChips(data.slice(1));
          render(data.slice(1));
        })
        .catch(() => {
          document.getElementById('list-wrap').innerHTML =
            '<div class="loading">❌ โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่</div>';
        });
    };

    function buildChips(items) {
      const types = [...new Set(items.map(r => r[3]).filter(Boolean))].sort();
      const wrap  = document.getElementById('chips-wrap');
      const sel   = document.getElementById('n-type-sel');
      types.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'chip'; btn.textContent = t; btn.dataset.type = t;
        btn.onclick = () => setFilter(t);
        wrap.appendChild(btn);
        sel.innerHTML += `<option value="${t}">${t}</option>`;
      });
    }

    function setFilter(type) {
      activeType = type;
      document.querySelectorAll('.chip').forEach(c =>
        c.classList.toggle('active', c.dataset.type === type)
      );
      render(allData.slice(1).filter(r => !type || r[3] === type));
    }

    function render(items) {
      document.getElementById('count-badge').textContent = `${items.length} รายการ`;
      const wrap = document.getElementById('list-wrap');
      if (!items.length) {
        wrap.innerHTML = '<div class="loading">ไม่พบสินค้าในหมวดนี้</div>';
        return;
      }
      const groups = {};
      items.forEach(row => {
        const cat = row[3] || 'อื่นๆ';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(row);
      });
      let html = '';
      Object.keys(groups).sort().forEach(cat => {
        html += `<div class="section-label">${cat} · ${groups[cat].length} รายการ</div>`;
        groups[cat].forEach(row => {
          const idx    = allData.findIndex(r => r === row) + 1;
          const name   = row[0] || '';
          const price  = parseFloat(row[1]) || 0;
          const rawNote = row[2] || '';
          const note   = (rawNote && rawNote !== '-') ? rawNote : '';
          const cost   = parseFloat(row[4]) || 0;
          const margin = (cost > 0 && price > 0) ? Math.round((price - cost) / price * 100) : null;
          const color  = catColor(cat);
          const sName  = (name+'').replace(/'/g,"&#39;").replace(/"/g,'&quot;');
          const sNote  = (note+'').replace(/'/g,"&#39;").replace(/"/g,'&quot;');
          html += `
            <div class="card">
              <div class="card-left">
                <div class="card-name">${name}</div>
                <div class="card-cat">
                  <span class="cat-dot" style="background:${color}"></span>
                  <span class="cat-name">${cat}</span>
                </div>
                ${note ? `<div class="note-pill">📌 ${note}</div>` : ''}
              </div>
              <div class="card-right">
                <div class="price">${price} ฿</div>
                ${margin !== null ? `<div class="cost-line">ทุน ${cost} ฿</div><div class="margin-line">Margin ${margin}%</div>` : ''}
                <button class="btn-edit"
                  onclick="editItem(${idx},'${sName}','${price}','${sNote}','${cost}')">
                  แก้ไข
                </button>
              </div>
            </div>`;
        });
      });
      wrap.innerHTML = html;
    }

    // ── Edit via fetch ──
    function editItem(idx, name, price, note, cost) {
      const newP = prompt(`ราคาขายของ "${name}":`, price);
      if (newP === null) return;
      const newC = prompt(`ราคาทุน (กด OK ข้ามได้):`, cost || '');
      if (newC === null) return;
      const newN = prompt(`หมายเหตุ (เช่น ของหมด):`, note);
      if (newN === null) return;
      toast('⏳ กำลังบันทึก...');
      const url = `${SCRIPT_URL}?action=update&row=${idx}&price=${encodeURIComponent(newP)}&note=${encodeURIComponent(newN)}&cost=${encodeURIComponent(newC)}`;
      fetch(url)
        .then(() => { toast('✅ อัปเดตแล้ว!', 'ok'); setTimeout(() => location.reload(), 900); })
        .catch(() => toast('❌ เกิดข้อผิดพลาด', 'err'));
    }

    // ── Add via fetch ──
    function submitAdd() {
      const name  = document.getElementById('n-name').value.trim();
      const price = document.getElementById('n-price').value.trim();
      const cost  = document.getElementById('n-cost').value.trim();
      const type  = document.getElementById('n-type').value.trim();
      if (!name)  { toast('⚠️ กรุณาใส่ชื่อสินค้า', 'err'); return; }
      if (!price) { toast('⚠️ กรุณาใส่ราคาขาย', 'err'); return; }
      if (!type)  { toast('⚠️ กรุณาเลือกหรือพิมพ์หมวดหมู่', 'err'); return; }
      const btn = document.getElementById('btn-save');
      btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';
      const url = `${SCRIPT_URL}?action=add&name=${encodeURIComponent(name)}&price=${encodeURIComponent(price)}&type=${encodeURIComponent(type)}&cost=${encodeURIComponent(cost)}`;
      fetch(url)
        .then(() => { toast('✅ เพิ่มสินค้าแล้ว!', 'ok'); setTimeout(() => location.reload(), 900); })
        .catch(() => {
          toast('❌ บันทึกไม่สำเร็จ', 'err');
          btn.disabled = false; btn.textContent = '💾 บันทึก';
        });
    }

    function openSheet()  { document.getElementById('overlay').classList.add('show'); document.getElementById('sheet').classList.add('show'); }
    function closeSheet() { document.getElementById('overlay').classList.remove('show'); document.getElementById('sheet').classList.remove('show'); }
    function syncType()   { const v = document.getElementById('n-type-sel').value; if (v) document.getElementById('n-type').value = v; }

    function toast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast show${type ? ' '+type : ''}`;
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 2200);
    }
  </script>
</body>
</html>
